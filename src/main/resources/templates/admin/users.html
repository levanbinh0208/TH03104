<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người dùng - Admin</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-admin   { background: #fef3c7; color: #92400e; }
        .badge-customer{ background: #d1fae5; color: #065f46; }
        .role-form     { display: inline-flex; gap: 6px; align-items: center; }
        .role-select   { padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; }
        .btn-save  { background: #2b6cb0; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-save:hover { background: #2c5282; }
        .btn-delete{ background: #e53e3e; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; text-decoration: none; }
        .btn-delete:hover { background: #c53030; }
        .avatar-circle {
            width: 36px; height: 36px; border-radius: 50%;
            background: #e2e8f0; display: flex; align-items: center;
            justify-content: center; font-weight: 700; color: #4a5568;
            font-size: 15px;
        }
        td.td-avatar { width: 50px; }
        .search-box {
            padding: 8px 14px; border: 1px solid #e2e8f0; border-radius: 6px;
            font-size: 14px; width: 240px;
        }
        .topbar h1 { margin: 0; }
        /* sidebar active fix */
        .sidebar ul { list-style: none; padding: 0; margin-top: 20px; }
        .sidebar ul li { margin: 12px 0; }
        .sidebar ul li a { color: #cbd5e1; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .sidebar ul li a.active, .sidebar ul li a:hover { color: #fff; }
    </style>
</head>
<body>
<div class="admin-container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo"><h2>📱 PhoneStore</h2></div>
        <nav>
            <ul>
                <li><a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a th:href="@{/admin/products}"><i class="fas fa-box"></i> Sản phẩm</a></li>
                <li><a th:href="@{/admin/users}" class="active"><i class="fas fa-users"></i> Khách hàng</a></li>
                <li><a th:href="@{/admin/orders}"><i class="fas fa-shopping-cart"></i> Đơn hàng</a></li>
                <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">
        <header class="topbar">
            <h1>Quản lý Người dùng</h1>
            <div class="user-info">Xin chào, <strong th:text="${fullName}"></strong></div>
        </header>

        <!-- Toolbar -->
        <div class="users-header">
            <span>Tổng: <strong th:text="${#lists.size(users)}"></strong> người dùng</span>
            <input class="search-box" type="text" id="searchInput"
                   placeholder="🔍 Tìm theo tên, email, SĐT..." oninput="filterTable()">
        </div>

        <!-- Table -->
        <table class="product-table" id="usersTable">
            <thead>
            <tr>
                <th>ID</th>
                <th></th>
                <th>Họ tên</th>
                <th>Tên đăng nhập</th>
                <th>Email</th>
                <th>Số điện thoại</th>
                <th>Ngày tạo</th>
                <th>Quyền</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${users == null or #lists.isEmpty(users)}">
                <td colspan="9" style="text-align:center; padding:24px; color:#718096;">
                    Chưa có người dùng nào
                </td>
            </tr>
            <tr th:each="u : ${users}">
                <td th:text="${u.userId}" style="color:#718096; font-size:13px;"></td>

                <!-- Avatar chữ cái đầu -->
                <td class="td-avatar">
                    <div class="avatar-circle"
                         th:text="${#strings.toUpperCase(#strings.substring(u.fullName, 0, 1))}">
                    </div>
                </td>

                <td th:text="${u.fullName}"></td>
                <td th:text="${u.userName}" style="color:#718096;"></td>
                <td th:text="${u.email}"></td>
                <td th:text="${u.phone != null ? u.phone : '—'}"></td>
                <td th:text="${u.createdAt != null ? #temporals.format(u.createdAt, 'dd/MM/yyyy') : '—'}"
                    style="font-size:13px; color:#718096;"></td>

                <!-- Badge quyền hiện tại -->
                <td>
                    <span class="badge"
                          th:classappend="${'ADMIN'.equalsIgnoreCase(u.roleName)} ? 'badge-admin' : 'badge-customer'"
                          th:text="${u.roleName}">
                    </span>
                </td>

                <!-- Form đổi quyền + nút xóa -->
                <td>
                    <form th:action="@{/admin/users/role}" method="post" class="role-form">
                        <input type="hidden" name="userId" th:value="${u.userId}">
                        <select name="roleName" class="role-select">
                            <option value="CUSTOMER"
                                    th:selected="${'CUSTOMER'.equalsIgnoreCase(u.roleName)}">CUSTOMER</option>
                            <option value="ADMIN"
                                    th:selected="${'ADMIN'.equalsIgnoreCase(u.roleName)}">ADMIN</option>
                        </select>
                        <button type="submit" class="btn-save">Lưu</button>
                    </form>
                    &nbsp;
                    <a th:href="@{/admin/users/delete/{id}(id=${u.userId})}"
                       class="btn-delete"
                       onclick="return confirm('Xóa người dùng này?')">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </main>
</div>

<script>
    function filterTable() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.querySelectorAll('#usersTable tbody tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(q) ? '' : 'none';
        });
    }
</script>
<div th:replace="~{fragments/toast :: toastBundle}"></div>
</body>
</html>
