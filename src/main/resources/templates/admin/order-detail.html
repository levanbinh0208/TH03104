<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết Đơn hàng - Admin</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .back-link        { display:inline-flex;align-items:center;gap:6px;color:#2b6cb0;text-decoration:none;font-size:14px;margin-bottom:20px; }
    .back-link:hover  { text-decoration:underline; }
    .info-grid        { display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px; }
    .info-card        { background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 2px 6px rgba(0,0,0,0.06); }
    .info-card h3     { margin:0 0 12px;font-size:14px;color:#718096;text-transform:uppercase;letter-spacing:.5px; }
    .info-row         { display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px; }
    .info-row label   { color:#718096; }
    .info-row span    { font-weight:600;text-align:right; }
    .badge            { display:inline-block;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:600; }
    .badge-pending    { background:#fef3c7;color:#92400e; }
    .badge-confirmed  { background:#dbeafe;color:#1e40af; }
    .badge-shipping   { background:#ede9fe;color:#5b21b6; }
    .badge-delivered  { background:#d1fae5;color:#065f46; }
    .badge-cancelled  { background:#fee2e2;color:#991b1b; }
    .section-title    { font-size:16px;font-weight:700;margin:24px 0 12px; }
    .product-img      { width:56px;height:56px;object-fit:contain;border-radius:6px;border:1px solid #e2e8f0; }
    .total-row td     { font-weight:700;font-size:15px;background:#f7fafc; }
    .amount           { color:#2b6cb0;font-weight:700; }
    .topbar h1        { margin:0; }
    .sidebar ul       { list-style:none;padding:0;margin-top:20px; }
    .sidebar ul li    { margin:12px 0; }
    .sidebar ul li a  { color:#cbd5e1;text-decoration:none;display:flex;align-items:center;gap:10px; }
    .sidebar ul li a.active,.sidebar ul li a:hover { color:#fff; }
    @media(max-width:700px){ .info-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div class="admin-container">
  <aside class="sidebar">
    <div class="logo"><h2>📱 PhoneStore</h2></div>
    <nav>
      <ul>
        <li><a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a th:href="@{/admin/products}"><i class="fas fa-box"></i> Sản phẩm</a></li>
        <li><a th:href="@{/admin/users}"><i class="fas fa-users"></i> Khách hàng</a></li>
        <li><a th:href="@{/admin/orders}" class="active"><i class="fas fa-shopping-cart"></i> Đơn hàng</a></li>
        <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h1>Chi tiết Đơn hàng</h1>
      <div class="user-info">Xin chào, <strong th:text="${fullName}"></strong></div>
    </header>

    <a th:href="@{/admin/orders}" class="back-link">
      <i class="fas fa-arrow-left"></i> Quay lại danh sách
    </a>

    <!-- Info cards -->
    <div class="info-grid">
      <!-- Thông tin đơn hàng -->
      <div class="info-card">
        <h3><i class="fas fa-file-invoice"></i> Thông tin đơn hàng</h3>
        <div class="info-row">
          <label>Mã đơn</label>
          <span th:text="'#' + ${order.orderId}"></span>
        </div>
        <div class="info-row">
          <label>Ngày đặt</label>
          <span th:text="${order.orderDate != null ? #dates.format(order.orderDate,'dd/MM/yyyy HH:mm') : '—'}"></span>
        </div>
        <div class="info-row">
          <label>Trạng thái</label>
          <span>
                        <span class="badge"
                              th:classappend="${order.status == 'PENDING'}    ? 'badge-pending'   :
                                              (${order.status == 'CONFIRMED'} ? 'badge-confirmed' :
                                              (${order.status == 'SHIPPING'}  ? 'badge-shipping'  :
                                              (${order.status == 'DELIVERED'} ? 'badge-delivered' :
                                              'badge-cancelled')))"
                              th:text="${order.status}">
                        </span>
                    </span>
        </div>
        <div class="info-row">
          <label>Thanh toán</label>
          <span th:text="${order.paymentMethod != null ? order.paymentMethod : '—'}"></span>
        </div>
        <div class="info-row">
          <label>Tổng tiền</label>
          <span class="amount"
                th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' ₫'">
                    </span>
        </div>
      </div>

      <!-- Thông tin giao hàng -->
      <div class="info-card">
        <h3><i class="fas fa-truck"></i> Thông tin giao hàng</h3>
        <div class="info-row">
          <label>Người nhận</label>
          <span th:text="${order.receiverName != null ? order.receiverName : '—'}"></span>
        </div>
        <div class="info-row">
          <label>Số điện thoại</label>
          <span th:text="${order.phone != null ? order.phone : '—'}"></span>
        </div>
        <div class="info-row">
          <label>Địa chỉ</label>
          <span th:text="${order.shippingAddress != null ? order.shippingAddress : '—'}"
                style="max-width:200px;text-align:right;"></span>
        </div>
      </div>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="section-title"><i class="fas fa-list"></i> Sản phẩm trong đơn</div>
    <table class="product-table">
      <thead>
      <tr>
        <th>Hình</th>
        <th>Tên sản phẩm</th>
        <th style="text-align:center;">Số lượng</th>
        <th style="text-align:right;">Đơn giá</th>
        <th style="text-align:right;">Thành tiền</th>
      </tr>
      </thead>
      <tbody>
      <tr th:if="${details == null or #lists.isEmpty(details)}">
        <td colspan="5" style="text-align:center;padding:20px;color:#718096;">
          Không có chi tiết sản phẩm
        </td>
      </tr>
      <tr th:each="d : ${details}">
        <td>
          <img th:if="${d.product != null and d.product.imageUrl != null}"
               th:src="@{/uploads/{f}(f=${d.product.imageUrl})}"
               class="product-img" alt="">
          <span th:unless="${d.product != null and d.product.imageUrl != null}">—</span>
        </td>
        <td th:text="${d.product != null ? d.product.productName : '—'}"></td>
        <td style="text-align:center;" th:text="${d.quantity}"></td>
        <td style="text-align:right;"
            th:text="${#numbers.formatDecimal(d.price,0,'COMMA',0,'POINT')} + ' ₫'"></td>
        <td style="text-align:right;" class="amount"
            th:text="${#numbers.formatDecimal(d.price * d.quantity,0,'COMMA',0,'POINT')} + ' ₫'"></td>
      </tr>
      </tbody>
      <tfoot>
      <tr class="total-row">
        <td colspan="4" style="text-align:right;padding-right:16px;">Tổng cộng:</td>
        <td style="text-align:right;" class="amount"
            th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + ' ₫'"></td>
      </tr>
      </tfoot>
    </table>
  </main>
</div>
</body>
</html>
