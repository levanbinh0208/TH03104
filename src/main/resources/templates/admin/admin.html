<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <style>

        body{
            margin:0;
            background:#f5f6fa;
            font-family:Arial;
        }

        .header{
            background:#2c3e50;
            color:white;
            padding:20px;
        }

        .container{
            width:90%;
            margin:auto;
        }

        .cards{
            display:flex;
            gap:20px;
            margin:20px 0;
        }

        .card{
            flex:1;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        .card h2{
            color:#3498db;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        table th{
            background:#3498db;
            color:white;
        }

        table th,
        table td{
            padding:10px;
            border:1px solid #ddd;
        }

        .section{
            margin-top:30px;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>ADMIN DASHBOARD</h1>
</div>

<div class="container">

    <div class="cards">

        <div class="card">
            <h2 th:text="${totalProducts}"></h2>
            <p>Tổng sản phẩm</p>
        </div>

        <div class="card">
            <h2 th:text="${totalOrders}"></h2>
            <p>Tổng đơn hàng</p>
        </div>

    </div>

    <div class="section">

        <h2>Danh sách sản phẩm</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Tồn kho</th>
            </tr>

            <tr th:each="p : ${products}">
                <td th:text="${p.productId}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td th:text="${p.stockQuantity}"></td>
            </tr>

        </table>

    </div>

    <div class="section">

        <h2>Danh sách đơn hàng</h2>

        <table>

            <tr>
                <th>Mã đơn</th>
                <th>User</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
            </tr>

            <tr th:each="o : ${orders}">
                <td th:text="${o.orderId}"></td>
                <td th:text="${o.userId}"></td>
                <td th:text="${o.totalAmount}"></td>
                <td th:text="${o.status}"></td>
            </tr>

        </table>

    </div>
    ```

</div>

</body>
</html>

</body>
</html>
