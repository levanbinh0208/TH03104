<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sửa sản phẩm - Admin</title>
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* sidebar */
    .sidebar ul{list-style:none;padding:0;margin-top:24px}
    .sidebar ul li{margin:4px 0}
    .sidebar ul li a{color:#94a3b8;text-decoration:none;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;font-size:14px;transition:background .15s,color .15s}
    .sidebar ul li a:hover{background:#ffffff14;color:#fff}
    .sidebar ul li a.active{background:#2b6cb0;color:#fff}

    /* topbar */
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .topbar h1{margin:0;font-size:22px;font-weight:700;color:#1a202c}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:#2b6cb0;text-decoration:none;font-size:14px}
    .back-link:hover{text-decoration:underline}

    /* form card */
    .form-card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.08);overflow:hidden;max-width:780px}
    .form-card-header{padding:18px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px}
    .form-card-header h2{margin:0;font-size:16px;font-weight:700;color:#1a202c}
    .form-card-header .icon{width:34px;height:34px;background:#ebf8ff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#2b6cb0;font-size:15px}
    .form-body{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .form-body .full{grid-column:1/-1}

    /* fields */
    .field label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
    .field label span{color:#e53e3e;margin-left:2px}
    .field input,.field textarea,.field select{
      width:100%;box-sizing:border-box;
      padding:9px 12px;border:1px solid #e2e8f0;border-radius:7px;
      font-size:14px;font-family:inherit;color:#1a202c;
      outline:none;transition:border-color .15s,box-shadow .15s;
    }
    .field input:focus,.field textarea:focus,.field select:focus{
      border-color:#2b6cb0;box-shadow:0 0 0 3px #ebf8ff;
    }
    .field textarea{resize:vertical;min-height:90px}
    .field .hint{font-size:12px;color:#94a3b8;margin-top:4px}

    /* image preview */
    .img-preview-wrap{grid-column:1/-1;display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
    .img-preview-box{
      width:110px;height:110px;border-radius:10px;border:2px dashed #e2e8f0;
      background:#f8fafc;display:flex;flex-direction:column;
      align-items:center;justify-content:center;color:#cbd5e1;font-size:12px;gap:6px;
      overflow:hidden;flex-shrink:0;
    }
    .img-preview-box img{width:100%;height:100%;object-fit:contain}
    .img-preview-box i{font-size:28px}
    .img-file-wrap{flex:1;min-width:200px}

    /* upload input style */
    .file-input-label{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 14px;border:1px solid #e2e8f0;border-radius:7px;
      background:#f8fafc;color:#374151;font-size:13px;cursor:pointer;
      transition:border-color .15s;
    }
    .file-input-label:hover{border-color:#2b6cb0;color:#2b6cb0}
    #imageInput{display:none}

    /* footer */
    .form-footer{
      padding:16px 24px;border-top:1px solid #f1f5f9;
      display:flex;align-items:center;justify-content:flex-end;gap:10px;
    }
    .btn-cancel{
      padding:9px 20px;border:1px solid #e2e8f0;border-radius:7px;
      background:#fff;color:#374151;font-size:14px;font-weight:600;
      text-decoration:none;cursor:pointer;transition:background .15s;
    }
    .btn-cancel:hover{background:#f8fafc}
    .btn-submit{
      padding:9px 24px;background:#2b6cb0;color:#fff;border:none;border-radius:7px;
      font-size:14px;font-weight:700;cursor:pointer;
      display:inline-flex;align-items:center;gap:7px;transition:background .15s;
    }
    .btn-submit:hover{background:#2c5282}
  </style>
</head>
<body>
<div class="admin-container">
  <aside class="sidebar">
    <div class="logo"><h2>📱 PhoneStore</h2></div>
    <ul>
      <li><a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a></li>
      <li><a th:href="@{/admin/products}" class="active"><i class="fas fa-box"></i> Sản phẩm</a></li>
      <li><a th:href="@{/admin/users}"><i class="fas fa-users"></i> Khách hàng</a></li>
      <li><a th:href="@{/admin/orders}"><i class="fas fa-shopping-cart"></i> Đơn hàng</a></li>
      <li><a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <header class="topbar">
      <div>
        <a th:href="@{/admin/products}" class="back-link">
          <i class="fas fa-arrow-left"></i> Quay lại danh sách
        </a>
        <h1 style="margin-top:6px;">Sửa sản phẩm</h1>
      </div>
    </header>

    <div class="form-card">
      <div class="form-card-header">
        <div class="icon"><i class="fas fa-pen"></i></div>
        <h2>Thông tin sản phẩm
          <span style="color:#94a3b8;font-weight:400;font-size:14px;"
                th:text="' — #' + ${product.productId}"></span>
        </h2>
      </div>

      <form th:action="@{/admin/products/edit}" method="post" enctype="multipart/form-data">
        <input type="hidden" name="productId" th:value="${product.productId}">
        <input type="hidden" name="imageUrl"  th:value="${product.imageUrl}" id="currentImageUrl">

        <div class="form-body">

          <div class="field full">
            <label>Tên sản phẩm <span>*</span></label>
            <input type="text" name="productName"
                   th:value="${product.productName}"
                   required>
          </div>

          <div class="field">
            <label>Giá bán (₫) <span>*</span></label>
            <input type="number" class="form-control" name="price" th:value="${product.price}" min="0" step="1000" required>
          </div>

          <div class="field">
            <label>Tồn kho <span>*</span></label>
            <input type="number" name="quantity"
                   th:value="${product.quantity}"
                   min="0" required>
          </div>

          <div class="field full">
            <label>Mô tả sản phẩm</label>
            <textarea name="description"
                      placeholder="Nhập mô tả chi tiết về sản phẩm..."
                      th:text="${product.description}"></textarea>
          </div>

          <div class="img-preview-wrap">
            <div class="img-preview-box" id="previewBox">
              <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                   th:src="@{/uploads/{f}(f=${product.imageUrl})}"
                   id="previewImg" alt="preview">
              <span th:if="${product.imageUrl == null or #strings.isEmpty(product.imageUrl)}"
                    id="previewPlaceholder">
                <i class="fas fa-image"></i>
                <span>Chưa có ảnh</span>
              </span>
            </div>

            <div class="img-file-wrap field">
              <label>Hình ảnh sản phẩm</label>
              <label class="file-input-label" for="imageInput">
                <i class="fas fa-upload"></i> Chọn ảnh mới
              </label>
              <input type="file" id="imageInput" name="image"
                     accept="image/*" onchange="previewImage(this)">
              <p class="hint">Để trống nếu không muốn thay đổi ảnh. Hỗ trợ JPG, PNG, WEBP.</p>
              <p class="hint" id="selectedFileName" style="color:#2b6cb0;display:none;"></p>
            </div>
          </div>

        </div>

        <div class="form-footer">
          <a th:href="@{/admin/products}" class="btn-cancel">Hủy</a>
          <button type="submit" class="btn-submit">
            <i class="fas fa-save"></i> Lưu thay đổi
          </button>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  function previewImage(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      const box = document.getElementById('previewBox');

      const placeholder = document.getElementById('previewPlaceholder');
      if (placeholder) placeholder.style.display = 'none';

      let img = document.getElementById('previewImg');
      if (!img) {
        img = document.createElement('img');
        img.id = 'previewImg';
        box.appendChild(img);
      }
      img.src = e.target.result;
      img.style.display = 'block';

      const nameEl = document.getElementById('selectedFileName');
      nameEl.textContent = '✓ ' + file.name;
      nameEl.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
</script>
<script th:src="@{/js/toast.js}"></script>
</body>
</html>
