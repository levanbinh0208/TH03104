<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu - Phone Store</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="page-wrapper">
  <div class="login-card">
    <!-- Header -->
    <div class="brand">
      <h1>📱 PhoneStore</h1>
      <p>Lấy lại mật khẩu</p>
    </div>

    <!-- Thông báo lỗi -->
    <div th:if="${error}" class="error-msg">
      <i class="fas fa-exclamation-circle"></i>
      <span th:text="${error}"></span>
    </div>

    <!-- Thông báo thành công -->
    <div th:if="${success}" class="success-msg">
      <i class="fas fa-check-circle"></i>
      <span th:text="${success}"></span>
    </div>

    <form th:action="@{/forgot-password}" method="post">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email đăng ký</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" name="email"
                 placeholder="Nhập email tài khoản của bạn" required autofocus>
        </div>
        <small class="form-hint">
          <i class="fas fa-info-circle"></i>
          Chúng tôi sẽ gửi link đặt lại mật khẩu qua email này.
        </small>
      </div>

      <button type="submit" class="btn-login">
        <i class="fas fa-paper-plane"></i> Gửi yêu cầu
      </button>
    </form>

    <div class="signup-row">
      <a th:href="@{/login}"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
    </div>
  </div>
</div>
</body>
</html>
