<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Phone Store</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="page-wrapper">
    <div class="login-card">
        <!-- Header -->
        <div class="brand">
            <h1>📱 PhoneStore</h1>
            <p>Đặt lại mật khẩu mới</p>
        </div>

        <!-- Thông báo lỗi -->
        <div th:if="${error}" class="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post">
            <!-- Token ẩn -->
            <input type="hidden" name="token" th:value="${token}">

            <!-- Mật khẩu mới -->
            <div class="form-group">
                <label for="newPassword">Mật khẩu mới</label>
                <div class="pwd-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" name="newPassword"
                           placeholder="Nhập mật khẩu mới" required autofocus minlength="6">
                    <button type="button" class="toggle-pwd" onclick="togglePassword('newPassword', 'eye1')">
                        <i class="fas fa-eye" id="eye1"></i>
                    </button>
                </div>
                <small class="form-hint">
                    <i class="fas fa-shield-alt"></i>
                    Tối thiểu 6 ký tự.
                </small>
            </div>

            <!-- Xác nhận mật khẩu -->
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <div class="pwd-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="Nhập lại mật khẩu mới" required minlength="6">
                    <button type="button" class="toggle-pwd" onclick="togglePassword('confirmPassword', 'eye2')">
                        <i class="fas fa-eye" id="eye2"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-save"></i> Đặt lại mật khẩu
            </button>
        </form>

        <div class="signup-row">
            <a th:href="@{/login}"><i class="fas fa-arrow-left"></i> Quay lại đăng nhập</a>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, eyeId) {
        const pwd = document.getElementById(inputId);
        const eye = document.getElementById(eyeId);
        if (pwd.type === "password") {
            pwd.type = "text";
            eye.classList.remove("fa-eye");
            eye.classList.add("fa-eye-slash");
        } else {
            pwd.type = "password";
            eye.classList.remove("fa-eye-slash");
            eye.classList.add("fa-eye");
        }
    }
</script>
</body>
</html>
